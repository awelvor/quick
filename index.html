layout: home

{% assign image_files = site.static_files  %}




<div class="gallery" style="display: flex; flex-wrap: wrap; gap: 20px;">
  {% for myimage in image_files %}
    <div class="image-container">
      <img src="{{ myimage.path | relative_url }}" alt="Image" style="max-width: 200px; height: auto;">
      <p style="font-size: 12px;">{{ myimage.path }}</p>
    </div>
  {% endfor %}
</div>

<p>index.html</p>
